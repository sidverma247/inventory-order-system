# nginx config template. ${PORT} and ${BACKEND_URL} are substituted by the
# nginx image's envsubst entrypoint at container start.
server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy backend API resources to the backend service. The SPA holds
    # no client-side routes on these paths, so this is unambiguous.
    location ~ ^/(products|customers|orders|stats|health|docs|openapi.json) {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — serve index.html for the single-page app.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
